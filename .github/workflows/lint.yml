name: Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Check Python formatting with ruff
        run: uvx ruff format --check .

      - name: Check TOML formatting with tombi
        run: uvx tombi format --check rrats/*.toml

      - name: Validate RRAT TOML schema
        run: uv run python validate_rrats.py rrats/*.toml